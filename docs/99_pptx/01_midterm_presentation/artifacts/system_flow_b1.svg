<svg width="100%" viewBox="0 0 680 366" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Lovv 시스템 흐름 B1 — 5계층 파이프라인과 사용자 경험 모멘트 매핑</title>
<desc>사용자 입력에서 Backend, 추천 에이전트, 데이터 스토어를 거쳐 근거 포함 추천·일정까지 흐르는 5계층 구조 위에, 추천 근거·실시간 수정·외부 이동이라는 세 가지 사용자 경험이 어느 시스템 동작에서 만들어지는지 점선으로 연결한 도식.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;}
.tt{font-size:14px;font-weight:600;fill:#222222;}
.ts{font-size:12px;font-weight:400;fill:#666666;}
.cap{font-size:12px;font-weight:400;fill:#8A8A82;}
.wt{font-size:14px;font-weight:600;fill:#FFF3E7;}
.ws{font-size:12px;font-weight:400;fill:#FCE7DB;}
.ut{font-size:14px;font-weight:600;fill:#D44A14;}
.us{font-size:12px;font-weight:400;fill:#B0511F;}
.ps{font-size:12px;font-weight:400;fill:#7A4326;}
</style>
</defs>

<rect x="0" y="0" width="680" height="366" rx="14" fill="#FFF3E7"/>

<text class="cap" x="40" y="26">사용자 경험 모멘트 — 이 경험은 시스템의 어느 동작이 만드나</text>

<rect x="282" y="36" width="116" height="56" rx="8" fill="#FFFFFF" stroke="#F26518" stroke-width="1.5"/>
<text class="ut" x="340" y="60" text-anchor="middle">② 실시간 수정</text>
<text class="us" x="340" y="78" text-anchor="middle">동선·일정 갱신</text>

<rect x="406" y="36" width="116" height="56" rx="8" fill="#FFFFFF" stroke="#F26518" stroke-width="1.5"/>
<text class="ut" x="464" y="60" text-anchor="middle">① 추천 근거</text>
<text class="us" x="464" y="78" text-anchor="middle">출처·검증 뱃지</text>

<rect x="530" y="36" width="110" height="56" rx="8" fill="#FFFFFF" stroke="#F26518" stroke-width="1.5"/>
<text class="ut" x="585" y="60" text-anchor="middle">③ 외부 이동</text>
<text class="us" x="585" y="78" text-anchor="middle">지도·숙소 링크</text>

<line x1="340" y1="92" x2="340" y2="150" stroke="#E0A07A" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="464" y1="92" x2="464" y2="150" stroke="#E0A07A" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="585" y1="92" x2="588" y2="150" stroke="#E0A07A" stroke-width="1" stroke-dasharray="3 3"/>

<rect x="40" y="152" width="104" height="64" rx="4" fill="#FFFFFF" stroke="#D44A14" stroke-width="1.5"/>
<text class="tt" x="92" y="180" text-anchor="middle">사용자 입력</text>
<text class="ts" x="92" y="198" text-anchor="middle">자연어·지도</text>

<rect x="164" y="152" width="104" height="64" rx="4" fill="#FCE7DB" stroke="#D44A14" stroke-width="1.5"/>
<text class="tt" x="216" y="180" text-anchor="middle">Backend API</text>
<text class="ps" x="216" y="198" text-anchor="middle">인증·프록시</text>

<rect x="288" y="152" width="104" height="64" rx="4" fill="#F26518" stroke="#D44A14" stroke-width="1.5"/>
<text class="wt" x="340" y="180" text-anchor="middle">추천 에이전트</text>
<text class="ws" x="340" y="198" text-anchor="middle">검색 → 일정</text>

<rect x="412" y="152" width="104" height="64" rx="4" fill="#FCE7DB" stroke="#D44A14" stroke-width="1.5"/>
<text class="tt" x="464" y="180" text-anchor="middle">데이터 스토어</text>
<text class="ps" x="464" y="198" text-anchor="middle">원장·축제</text>

<rect x="536" y="152" width="104" height="64" rx="4" fill="#FFFFFF" stroke="#D44A14" stroke-width="1.5"/>
<text class="tt" x="588" y="180" text-anchor="middle">추천 + 일정</text>
<text class="ts" x="588" y="198" text-anchor="middle">근거 포함</text>

<line x1="145" y1="184" x2="161" y2="184" stroke="#9A9A93" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="269" y1="184" x2="285" y2="184" stroke="#9A9A93" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="393" y1="184" x2="409" y2="184" stroke="#9A9A93" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="517" y1="184" x2="533" y2="184" stroke="#9A9A93" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="216" y1="216" x2="216" y2="251" stroke="#9A9A93" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<rect x="164" y="252" width="104" height="48" rx="4" fill="#FCE7DB" stroke="#D44A14" stroke-width="1.5"/>
<text class="tt" x="216" y="272" text-anchor="middle">External APIs</text>
<text class="ps" x="216" y="289" text-anchor="middle">지도·날씨</text>

<text class="cap" x="340" y="324" text-anchor="middle">Explainable RAG · 입력부터 근거 있는 추천·일정까지 한 흐름</text>

<rect x="40" y="338" width="12" height="12" rx="3" fill="#FFFFFF" stroke="#D44A14" stroke-width="1.2"/>
<text class="ts" x="58" y="348">사용자 접점</text>
<rect x="150" y="338" width="12" height="12" rx="3" fill="#FCE7DB" stroke="#D44A14" stroke-width="1.2"/>
<text class="ts" x="168" y="348">인프라</text>
<rect x="232" y="338" width="12" height="12" rx="3" fill="#F26518"/>
<text class="ts" x="250" y="348">추천 엔진</text>
<rect x="330" y="338" width="12" height="12" rx="3" fill="#FFFFFF" stroke="#F26518" stroke-width="1.2"/>
<text class="ts" x="348" y="348">사용자 경험</text>
</svg>
