<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1260" viewBox="0 0 1920 1260" role="img" aria-labelledby="title desc">
  <title id="title">Lovv current AWS system architecture</title>
  <desc id="desc">AWS style system architecture diagram for Lovv development environment as of 2026-07-09.</desc>
  <defs>
    <style>
      .canvas { fill: #f7f8fa; }
      .title { font: 700 34px Arial, sans-serif; fill: #232f3e; }
      .subtitle { font: 16px Arial, sans-serif; fill: #5f6b7a; }
      .boundary { fill: #ffffff; stroke: #8793a2; stroke-width: 2; rx: 18; }
      .cloud { fill: #ffffff; stroke: #232f3e; stroke-width: 3; rx: 24; }
      .region { fill: #fbfcfd; stroke: #527fff; stroke-width: 2.5; rx: 20; }
      .vpc { fill: #f6fff8; stroke: #2e7d32; stroke-width: 2.5; stroke-dasharray: 10 8; rx: 18; }
      .subnet-public { fill: #fff8ec; stroke: #d68800; stroke-width: 2; rx: 14; }
      .subnet-private { fill: #f2fff4; stroke: #2e7d32; stroke-width: 2; rx: 14; }
      .edge { fill: #eef5ff; stroke: #527fff; stroke-width: 2; rx: 16; }
      .group-title { font: 700 17px Arial, sans-serif; fill: #232f3e; }
      .group-subtitle { font: 13px Arial, sans-serif; fill: #5f6b7a; }
      .svc { fill: #ffffff; stroke: #b8c0cc; stroke-width: 1.6; rx: 10; filter: url(#shadow); }
      .svc-title { font: 700 14px Arial, sans-serif; fill: #172033; }
      .svc-small { font: 12px Arial, sans-serif; fill: #4f5b6b; }
      .badge { fill: #ff9900; rx: 7; }
      .badge-blue { fill: #527fff; rx: 7; }
      .badge-green { fill: #3f8624; rx: 7; }
      .badge-purple { fill: #8c4fff; rx: 7; }
      .badge-gray { fill: #5f6b7a; rx: 7; }
      .badge-text { font: 700 12px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .arrow { fill: none; stroke: #232f3e; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #6b7788; stroke-width: 2; marker-end: url(#arrow-soft); }
      .arrow-dash { fill: none; stroke: #6b7788; stroke-width: 2.1; stroke-dasharray: 8 7; marker-end: url(#arrow-soft); }
      .label { font: 12px Arial, sans-serif; fill: #232f3e; }
      .note { font: 13px Arial, sans-serif; fill: #44546a; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#232f3e"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6b7788"/>
    </marker>
  </defs>

